<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인증 | CloudPress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 border border-slate-100">
        <div class="text-center mb-10">
            <div class="text-3xl font-black text-blue-600 italic tracking-tighter mb-2 cursor-pointer" onclick="location.href='/'">CloudPress</div>
            <h2 id="auth-title" class="text-2xl font-bold text-slate-800">반가워요!</h2>
            <p id="auth-desc" class="text-slate-400 font-medium mt-1">계정 정보를 입력하여 접속하세요.</p>
        </div>

        <form onsubmit="handleAuth(event)" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1 ml-1">이메일</label>
                <input type="email" id="auth-email" class="w-full border p-4 rounded-2xl bg-slate-50 font-medium focus:bg-white transition-all" placeholder="name@company.com" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1 ml-1">비밀번호</label>
                <input type="password" id="auth-password" class="w-full border p-4 rounded-2xl bg-slate-50 font-medium focus:bg-white transition-all" placeholder="••••••••" required>
            </div>
            <button type="submit" id="auth-submit-btn" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-lg shadow-lg shadow-blue-100 hover:bg-blue-700 hover:-translate-y-0.5 transition-all mt-6">
                로그인
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-slate-400 font-bold text-sm">
                <span id="auth-toggle-text">아직 계정이 없으신가요?</span>
                <button onclick="toggleAuthMode()" id="auth-toggle-btn" class="text-blue-600 ml-1 hover:underline">회원가입</button>
            </p>
        </div>
    </div>
    <script src="/dashboard.js"></script>
    <script>
        // URL 파라미터에 따라 모드 초기화
        const params = new URLSearchParams(window.location.search);
        if (params.get('mode') === 'signup') toggleAuthMode();
    </script>
</body>
</html>

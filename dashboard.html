<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>대시보드 | CloudPress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex">
    <aside class="w-72 min-h-screen bg-white border-r p-8 sticky top-0">
        <div class="font-black text-3xl mb-12 text-blue-600 italic tracking-tighter">CloudPress</div>
        <nav class="space-y-3">
            <button class="w-full text-left p-4 rounded-2xl bg-blue-50 text-blue-600 font-black"><i class="fa-solid fa-server mr-3"></i>인스턴스</button>
            <button class="w-full text-left p-4 rounded-2xl text-slate-400 font-bold hover:bg-slate-50"><i class="fa-solid fa-globe mr-3"></i>도메인 설정</button>
            <div class="pt-10">
                <button onclick="logout()" class="w-full text-left p-4 rounded-2xl text-red-400 font-bold hover:bg-red-50"><i class="fa-solid fa-right-from-bracket mr-3"></i>로그아웃</button>
            </div>
        </nav>
    </aside>
    <main class="flex-1 p-16">
        <header class="flex justify-between items-center mb-16">
            <h1 class="text-4xl font-black text-slate-900 tracking-tight">내 호스팅 리스트</h1>
            <button onclick="openModal('create-modal')" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all">+ 신규 인스턴스</button>
        </header>
        <div id="hosting-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </main>

    <div id="create-modal" class="fixed inset-0 bg-slate-900/40 hidden flex items-center justify-center z-[100] backdrop-blur-md">
        <div class="bg-white rounded-[2rem] p-10 max-w-md w-full mx-4 shadow-2xl border border-white">
            <h2 class="text-2xl font-black mb-6 text-slate-900">새 사이트 정보</h2>
            <div class="space-y-5">
                <input type="text" id="new-hosting-name" class="w-full border p-4 rounded-2xl bg-slate-50 font-bold focus:bg-white transition-all" placeholder="인스턴스 별칭">
                <input type="text" id="new-hosting-domain" class="w-full border p-4 rounded-2xl bg-slate-50 font-bold focus:bg-white transition-all" placeholder="연결할 도메인">
                <div class="flex justify-end space-x-3 pt-6">
                    <button onclick="closeModal('create-modal')" class="px-6 py-2 text-slate-400 font-bold">취소</button>
                    <button onclick="createHosting()" class="px-10 py-4 bg-slate-900 text-white rounded-2xl font-black shadow-lg">인스턴스 배포</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/dashboard.js"></script>
</body>
</html>

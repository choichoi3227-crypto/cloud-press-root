<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>대시보드 | CloudPress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex">
    <aside class="w-64 min-h-screen bg-white border-r p-6 sticky top-0">
        <div class="font-black text-2xl mb-12 text-blue-600 italic">CloudPress</div>
        <nav class="space-y-2">
            <button onclick="location.href='/dashboard.html'" class="w-full text-left p-3 rounded-xl bg-blue-50 text-blue-600 font-bold"><i class="fa-solid fa-server mr-2"></i>내 인스턴스</button>
            <button class="w-full text-left p-3 rounded-xl text-slate-500 hover:bg-slate-50"><i class="fa-solid fa-globe mr-2"></i>DNS 및 도메인</button>
        </nav>
    </aside>
    <main class="flex-1 p-12">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-4xl font-black text-slate-900">내 호스팅</h1>
            <button onclick="openModal('create-modal')" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all">+ 새 사이트 추가</button>
        </header>
        <div id="hosting-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="create-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full mx-4 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">새 호스팅 인스턴스 생성</h2>
            <div class="space-y-4">
                <input type="text" id="new-hosting-name" class="w-full border p-4 rounded-xl" placeholder="호스팅 이름">
                <input type="text" id="new-hosting-domain" class="w-full border p-4 rounded-xl" placeholder="연결 도메인">
                <div class="flex justify-end space-x-3 pt-4">
                    <button onclick="closeModal('create-modal')" class="px-6 py-2 text-slate-500 font-bold">취소</button>
                    <button onclick="createHosting()" class="px-8 py-2 bg-blue-600 text-white rounded-xl font-bold">배포 시작</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/dashboard.js"></script>
</body>
</html>
